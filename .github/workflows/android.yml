name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android.yml'
  workflow_dispatch: {}

permissions:
  contents: write # needed to publish the APK to a Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      # Persist one signing key across builds so APKs install over each other.
      - name: Cache signing keystore
        uses: actions/cache@v4
        with:
          path: android/fixed-debug.keystore
          key: android-fixed-keystore-v1

      - name: Generate keystore if missing
        run: |
          if [ ! -f android/fixed-debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore android/fixed-debug.keystore \
              -storepass android -keypass android \
              -alias aicalendar -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=AI Calendar, OU=App, O=AI Calendar, L=Seoul, S=Seoul, C=KR"
          fi

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Publish APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: widget-latest
          name: AI 캘린더 위젯 (최신 빌드)
          body: |
            자동 빌드된 디버그 APK입니다.
            아래 **app-debug.apk** 를 폰으로 다운로드해 설치하세요.
            (설정 → 알 수 없는 출처 앱 설치 허용 필요)
          files: android/app/build/outputs/apk/debug/app-debug.apk
          make_latest: 'true'
